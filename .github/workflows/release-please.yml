name: release-please

# Automates versioning + releases from Conventional Commit messages.
# On every push to main, release-please opens/updates a "release PR" that bumps
# the version and updates CHANGELOG.md. Merging that PR tags the version and
# publishes a GitHub Release — which triggers the Zenodo webhook to mint a DOI.
#
# One-time repo setting required: Settings → Actions → General →
# "Allow GitHub Actions to create and approve pull requests" → enabled.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
