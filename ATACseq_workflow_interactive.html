<title>ATAC-seq pipeline — interactive workflow</title>
<style>
  :root{
    --paper:#f6f8fa; --surface:#ffffff; --fg:#152230; --muted:#5b6b7b;
    --line:#e4e9ef; --line-strong:#d3dbe4; --accent:#0e7490; --accent-ink:#ffffff;
    --slide:#ffffff; --rail-w:212px; --bar-h:52px; --panel-w:352px;
    --shadow:0 1px 2px rgba(18,30,45,.06), 0 10px 30px rgba(18,30,45,.12);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --paper:#0e151d; --surface:#131c26; --fg:#e7edf3; --muted:#8a9aab;
    --line:#243141; --line-strong:#2f3f52; --accent:#38bdf8; --accent-ink:#06121b;
    --slide:#ffffff; --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 34px rgba(0,0,0,.5);
  }}
  :root[data-theme="light"]{--paper:#f6f8fa;--surface:#fff;--fg:#152230;--muted:#5b6b7b;--line:#e4e9ef;--line-strong:#d3dbe4;--accent:#0e7490;--accent-ink:#fff;--slide:#fff;--shadow:0 1px 2px rgba(18,30,45,.06),0 10px 30px rgba(18,30,45,.12)}
  :root[data-theme="dark"]{--paper:#0e151d;--surface:#131c26;--fg:#e7edf3;--muted:#8a9aab;--line:#243141;--line-strong:#2f3f52;--accent:#38bdf8;--accent-ink:#06121b;--slide:#fff;--shadow:0 1px 2px rgba(0,0,0,.3),0 12px 34px rgba(0,0,0,.5)}

  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--paper);color:var(--fg);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
  .app{display:grid;grid-template-columns:var(--rail-w) 1fr;grid-template-rows:var(--bar-h) 1fr;grid-template-areas:"bar bar" "rail view";height:100vh;height:100dvh}
  .app.norail{grid-template-columns:0 1fr}
  .app.norail .rail{transform:translateX(-100%);opacity:0;pointer-events:none}

  .bar{grid-area:bar;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--line);z-index:20}
  .title{display:flex;align-items:baseline;gap:10px;min-width:0}
  .title .mark{font-weight:680;letter-spacing:-.01em;white-space:nowrap}
  .title .sub{color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tools{display:flex;align-items:center;gap:8px}
  .zoomgrp{display:flex;align-items:center;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
  .zoomgrp button{border:0;border-radius:0}
  .zoomgrp button+button{border-left:1px solid var(--line-strong)}
  #pct{font-variant-numeric:tabular-nums;min-width:52px;font-size:12.5px;color:var(--muted)}
  button{font:inherit;color:var(--fg);background:var(--surface);border:1px solid var(--line-strong);border-radius:9px;padding:7px 11px;cursor:pointer;line-height:1;transition:background .15s,border-color .15s,color .15s}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:15px}

  .rail{grid-area:rail;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;transition:transform .25s ease,opacity .2s ease;z-index:15}
  .railhead{padding:14px 14px 10px}
  .eyebrow{display:block;font-size:10.5px;font-weight:670;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .stepper{display:grid;grid-template-columns:34px 1fr 34px;gap:6px}
  .stepper .all{font-size:12px;padding:7px 6px}
  .stages{list-style:none;margin:0;padding:2px 8px 8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:2px}
  .stages li{display:flex;align-items:center;gap:9px;padding:8px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:background .12s,border-color .12s}
  .stages li:hover{background:color-mix(in srgb,var(--accent) 8%,transparent)}
  .stages li.active{background:color-mix(in srgb,var(--accent) 13%,transparent);border-color:color-mix(in srgb,var(--accent) 35%,transparent)}
  .stages li .dot{width:11px;height:11px;border-radius:3px;flex:none;border:1.5px solid rgba(0,0,0,.15)}
  .stages li .nm{font-size:12.5px;font-weight:560}
  .stages li .ct{margin-left:auto;font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .hints{padding:11px 14px;border-top:1px solid var(--line);color:var(--muted);font-size:11px;display:flex;flex-direction:column;gap:4px}
  .hints kbd{font-family:var(--mono);font-size:10px;background:var(--paper);border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:4px;padding:1px 5px;margin-right:2px;color:var(--fg)}

  .stage{grid-area:view;position:relative;overflow:hidden;background:var(--slide);background-image:radial-gradient(circle at 1px 1px,color-mix(in srgb,var(--fg) 6%,transparent) 1px,transparent 0);background-size:26px 26px;touch-action:none;cursor:grab}
  .stage.grabbing{cursor:grabbing}
  .pz{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #my-svg{max-width:none !important;width:3628.5px;height:1962px;background:transparent !important;display:block}
  #my-svg .nodes>g,#my-svg .edgePaths>path,#my-svg .edgeLabels>g{transition:opacity .25s ease}
  .focus #my-svg .nodes>g:not(.on){opacity:.10}
  .focus #my-svg .edgePaths>path:not(.on){opacity:.05}
  .focus #my-svg .edgeLabels>g:not(.on){opacity:.08}
  #my-svg .edgePaths>path.on{stroke-width:3px}
  #my-svg .nodes>g{cursor:pointer}
  #my-svg .nodes>g:hover{filter:drop-shadow(0 0 7px color-mix(in srgb,var(--accent) 70%,transparent))}
  #my-svg .nodes>g.sel{filter:drop-shadow(0 0 0 2px var(--accent)) drop-shadow(0 0 9px color-mix(in srgb,var(--accent) 80%,transparent))}
  @media (prefers-reduced-motion:reduce){#my-svg .nodes>g,#my-svg .edgePaths>path,#my-svg .edgeLabels>g,.rail,.panel{transition:none}}

  /* detail panel */
  .panel{position:absolute;top:12px;right:12px;bottom:12px;width:var(--panel-w);max-width:calc(100% - 24px);
    background:var(--surface);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;overflow:hidden;z-index:14;
    transform:translateX(calc(100% + 20px));opacity:0;transition:transform .28s cubic-bezier(.2,.7,.3,1),opacity .2s;pointer-events:none}
  .panel.open{transform:none;opacity:1;pointer-events:auto}
  .phead{padding:15px 16px 12px;border-bottom:1px solid var(--line);position:relative}
  .phead .badge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:680;letter-spacing:.08em;text-transform:uppercase;color:#fff;padding:3px 9px;border-radius:999px}
  .phead h2{margin:9px 0 2px;font-size:19px;font-weight:660;letter-spacing:-.01em;line-height:1.2;text-wrap:balance}
  .phead .idrow{display:flex;align-items:center;gap:8px;margin-top:5px}
  .phead .nid{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .phead .tool{font-size:11.5px;color:var(--accent);font-weight:600}
  .phead .x{position:absolute;top:12px;right:12px}
  .pbody{padding:14px 16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px}
  .pdesc{font-size:13.5px;line-height:1.5;color:var(--fg)}
  .sect .lbl{font-size:10.5px;font-weight:680;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .params{display:flex;flex-direction:column;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .params .row{display:grid;grid-template-columns:38% 1fr;gap:10px;padding:8px 11px;font-size:12.5px}
  .params .row:nth-child(odd){background:color-mix(in srgb,var(--fg) 3%,transparent)}
  .params .k{color:var(--muted);font-weight:560}
  .params .v{font-family:var(--mono);font-size:11.5px;color:var(--fg);word-break:break-word}
  .flow{display:flex;flex-direction:column;gap:9px}
  .flow .grp{display:flex;flex-direction:column;gap:5px}
  .flow .glbl{font-size:11px;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chips button{font-size:11.5px;padding:4px 9px;border-radius:7px;background:var(--paper)}
  .chips button:hover{background:color-mix(in srgb,var(--accent) 12%,transparent)}

  .cue{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--line-strong);border-radius:999px;padding:6px 14px;box-shadow:var(--shadow);font-size:12.5px;font-weight:560;opacity:0;transition:opacity .3s;pointer-events:none;z-index:12;display:flex;align-items:center;gap:8px}
  .cue.show{opacity:1}
  .cue .sw{width:10px;height:10px;border-radius:3px;border:1.5px solid rgba(0,0,0,.15)}
  @media (max-width:720px){:root{--rail-w:0px;--panel-w:300px}.title .sub{display:none}.rail{position:absolute;inset:var(--bar-h) auto 0 0;width:200px;z-index:30}}
</style>

<div class="app" id="app">
  <header class="bar">
    <div class="title">
      <span class="mark">ATAC-seq spike-in pipeline</span>
      <span class="sub">interactive workflow · click a step for its parameters</span>
    </div>
    <div class="tools">
      <div class="zoomgrp" role="group" aria-label="Zoom">
        <button class="icon" data-act="zoomout" aria-label="Zoom out">−</button>
        <button id="pct" data-act="reset" title="Reset to 100%">100%</button>
        <button class="icon" data-act="zoomin" aria-label="Zoom in">+</button>
      </div>
      <button data-act="fit">Fit</button>
      <button class="icon" data-act="rail" title="Toggle panel" aria-label="Toggle side panel">⊟</button>
      <button class="icon" data-act="full" id="fullbtn" title="Fullscreen" aria-label="Fullscreen">⛶</button>
      <button class="icon" data-act="theme" title="Toggle theme" aria-label="Toggle light/dark">◐</button>
    </div>
  </header>

  <aside class="rail">
    <div class="railhead">
      <span class="eyebrow">Walk the pipeline</span>
      <div class="stepper" role="group" aria-label="Step through stages">
        <button class="icon" data-act="prev" aria-label="Previous stage">←</button>
        <button class="all" data-act="all">All stages</button>
        <button class="icon" data-act="next" aria-label="Next stage">→</button>
      </div>
    </div>
    <ul class="stages" id="stages"></ul>
    <div class="hints">
      <p>Drag to pan · scroll to zoom</p>
      <p>Click a step → details + parameters</p>
      <p><kbd>←</kbd><kbd>→</kbd> stage · <kbd>F</kbd> full · <kbd>Esc</kbd> clear</p>
    </div>
  </aside>

<script>
(function(){
  "use strict";
  const STAGES=[
    {id:"INPUT",name:"Input",color:"#5a9bd5",nodes:["A","SC","HF","SF","BL","GTF","TB","PE","CFG"]},
    {id:"PREPROC",name:"Pre-processing",color:"#9b6bc9",nodes:["B","C","E"]},
    {id:"GENOME",name:"Combined genome",color:"#9b6bc9",nodes:["BCG","IDX"]},
    {id:"ALIGN",name:"Alignment & split",color:"#9b6bc9",nodes:["G","SAM","HS","MT","FB","SPK","SCNT"]},

    {id:"SPIKE",name:"Spike-in norm.",color:"#d6699a",nodes:["NF","NFT","BW","SBW"]},
    {id:"PEAKS",name:"Peaks & consensus",color:"#d6699a",nodes:["R","S","CP","CPB","FC","CM"]},
    {id:"QC",name:"QC metrics",color:"#5fae63",nodes:["FRAG","FP","COR","GC","TSS","FRIP","QRLX","IDRQC","CPLX","SQC","ANN","QCR","MQC"]},

  const node2stage={}; STAGES.forEach(s=>s.nodes.forEach(n=>node2stage[n]=s));

  // node details + real parameters (from the snakefile rules)
  const INFO={
    A:{t:"Raw FASTQ",k:"input",d:"Paired-end reads, one R1/R2 pair per sample.",p:[["path","data/{sample}_R{1,2}_001.fastq.gz"]]},

    BL:{t:"Blacklist",k:"input",d:"ENCODE blacklist regions, removed at fragment level.",p:[["file","ref/hg38_blacklist_regions.bed"]]},
    GTF:{t:"GTF annotation",k:"input",d:"GENCODE genes for TSS enrichment and Gviz gene models.",p:[["file","ref/gencode.v36.annotation.gtf"]]},
    TB:{t:"2bit genome",k:"input",d:"Genome sequence for GC-bias estimation.",p:[["file","ref/hg38.2bit"]]},
    PE:{t:"Promoter / Enhancer BED",k:"input",d:"Annotation regions for reads-in-feature QC.",p:[["files","promoter_ / enhancer_chr1-22X.bed"]]},

    B:{t:"FastQC",k:"step",tool:"FastQC",d:"Quality control of the raw reads.",p:[["threads","2"]]},

    E:{t:"Trimmed FASTQ",k:"data",d:"fastp-trimmed reads.",p:[]},
    BCG:{t:"Build combined index",k:"step",tool:"samtools + bowtie2-build",d:"Subset human to align_chroms, prefix spike-in chrom names, concatenate, build one Bowtie2 index.",p:[["human chroms","chr1-22, X, M"],["spike-in prefix","spikein_"],["threads","8"]]},
    IDX:{t:"Bowtie2 index",k:"data",d:"Combined human + spike-in index.",p:[["path","ref/COMBINED/genome"]]},
    G:{t:"Bowtie2 align",k:"step",tool:"Bowtie2",d:"One alignment pass to the combined genome; kept as a full coordinate-sorted BAM.",p:[["insert","-I 0 -X 3000"],["mode","--no-discordant --no-mixed"],["quality","--phred33"],["threads","20"]]},
    SAM:{t:"Combined BAM",k:"data",d:"Full alignment: all reads (incl. unmapped/multimappers) + tags.",p:[]},
    HS:{t:"Filter human reads",k:"step",tool:"samtools + process_sam.py",d:"Keep properly-paired, unique, non-spike-in reads; drop mates orphaned by filtering.",p:[["flags","-f 2 -F 2316"],["unique","drop XS:i: multimappers"],["orphans","process_sam.py"]]},
    MT:{t:"Mito %",k:"step",tool:"samtools idxstats",d:"Record chrM fraction before dropping non-analysis chroms (ENCODE QC).",p:[["metric","chrM / total mapped"]]},
    FB:{t:"Filtered BAM",k:"data",d:"Human reads restricted to the analysis chromosomes.",p:[["keep","chr1-22, X (drop chrM/chrY)"]]},
    SPK:{t:"Extract spike-in",k:"step",tool:"samtools + Picard",d:"Spike-in-prefixed reads, same properly-paired/unique filter, then deduplicated and counted.",p:[["select","RNAME ^spikein_"],["dedup","Picard MarkDuplicates"]]},
    SCNT:{t:"Spike-in counts",k:"data",d:"Deduplicated spike-in read count per sample.",p:[]},
    L:{t:"Picard dedup",k:"step",tool:"Picard MarkDuplicates",d:"PCR duplicate removal on the human BAM.",p:[["remove","REMOVE_DUPLICATES=true"],["sorted","ASSUME_SORTED=true"],["validation","LENIENT"]]},
    M:{t:"Dedup BAM",k:"data",d:"Duplicate-free human BAM.",p:[]},
    N:{t:"Blacklist filter",k:"step",tool:"bedtools + samtools",d:"Remove whole fragments overlapping the ENCODE blacklist (paired-aware, fragment-level).",p:[["method","BEDPE → intersect → drop fragment IDs"]]},
    O:{t:"Analysis BAM",k:"data",d:"Final analysis-ready BAM — the input to peak calling, bigWigs and QC.",p:[["path","blacklist_filtered/{sample}.nobl.bam"]]},
    NF:{t:"Norm factors",k:"step",tool:"compute_spikein_factors.py",d:"Per-sample spike-in scaling factor.",p:[["formula","NF = min(spike-in) / spike-in_i"],["anchor","fewest-spike-in sample = 1.0"]]},
    NFT:{t:"factors.tsv",k:"data",d:"sample · spikein_reads · norm_factor.",p:[]},
    BW:{t:"RPGC bigWig",k:"step",tool:"deepTools bamCoverage",d:"Depth-normalized (1×) coverage track.",p:[["normalize","RPGC"],["EGS","2,913,022,398"],["bin","25 bp"],["reads","--extendReads"]]},
    SBW:{t:"Spike-in bigWig",k:"step",tool:"deepTools bamCoverage",d:"Spike-in-scaled coverage track.",p:[["scale","--scaleFactor NF"],["bin","25 bp"],["reads","--extendReads"]]},

    S:{t:"narrowPeak",k:"data",d:"Per-sample MACS2 peaks.",p:[]},
    CP:{t:"Consensus peaks",k:"step",tool:"consensus_peaks.py",d:"Reproducible fixed-width consensus set (Corces 2018 iterative overlap).",p:[["width","500 bp, summit-centered"],["rank","score-per-million (SPM)"],["reproducibility","majority ≥2/N, or IDR for 2 reps"]]},

    FC:{t:"featureCounts",k:"step",tool:"Subread featureCounts",d:"Fragment counting over the consensus set.",p:[["annotation","-F SAF"],["paired","-p --countReadPairs"],["threads","8"]]},
    CM:{t:"Count matrix",k:"data",d:"regions × samples fragment matrix → differential analysis.",p:[["file","consensus/consensus_counts.txt"]]},
    FRAG:{t:"Fragment size",k:"step",tool:"deepTools bamPEFragmentSize",d:"Insert-size / nucleosome-ladder distribution.",p:[["max","1500 bp"],["raw","--outRawFragmentLengths"]]},
    FP:{t:"Fingerprint",k:"step",tool:"deepTools plotFingerprint",d:"Signal-to-noise across samples.",p:[["dups","--ignoreDuplicates"],["--skipZeros",""]]},
    COR:{t:"Correlation / PCA",k:"step",tool:"deepTools multiBamSummary",d:"Cross-sample similarity heatmap/scatter and PCA.",p:[["bins","5000 bp"],["method","Spearman, log1p"]]},
    GC:{t:"GC bias",k:"step",tool:"deepTools computeGCBias",d:"Sequence-composition bias per sample.",p:[["genome","hg38.2bit"],["EGS","2.91e9"]]},
    TSS:{t:"TSS enrichment",k:"step",tool:"deepTools computeMatrix",d:"TSS heatmap/profile and numeric score, from the RPGC bigWigs.",p:[["window","TSS ± 2000 bp"],["--skipZeros",""]]},
    FRIP:{t:"FRiP",k:"step",tool:"bedtools + samtools",d:"Fraction of reads in peaks.",p:[["formula","reads-in-peaks / total"]]},
    QRLX:{t:"Relaxed peaks",k:"step",tool:"MACS2 callpeak",d:"Relaxed calls used as IDR input.",p:[["p-value","0.1"],["top-N","150,000"]]},
    IDRQC:{t:"IDR",k:"step",tool:"idr",d:"Reproducibility on within-condition replicate pairs.",p:[["rank","p.value"]]},
    CPLX:{t:"Library complexity",k:"step",tool:"bedtools + awk",d:"PCR-bottleneck metrics from fragment locations.",p:[["NRF","Nd / Total"],["PBC1","N1 / Nd"],["PBC2","N1 / N2"]]},
    SQC:{t:"Spike-in QC",k:"step",tool:"samtools + awk",d:"Spike-in read fraction vs the Active Motif target.",p:[["target","2–10%"]]},
    ANN:{t:"Reads in annotations",k:"step",tool:"bedtools",d:"Reads overlapping promoters vs enhancers.",p:[]},
    QCR:{t:"QC report",k:"step",tool:"build_qc_report.py",d:"Self-contained interactive HTML with every QC metric except FastQC. Each metric is tagged with its counting unit (fragments / reads / pairs / unit-free ratio).",p:[["file","qc/atacseq_qc_report.html"],["funnel","usable fragments + % of raw read pairs"],["nucleosome","NFR / mono / di fractions + peak detection"],["metrics","alignment, mito, dup, complexity, spike-in, FRiP, TSS, annotation, blacklist"],["charts","interactive SVG / canvas"]]},

  };

  const app=document.getElementById("app"), vp=document.getElementById("viewport"), pz=document.getElementById("pz");
  const svg=document.getElementById("my-svg"), diagram=pz, pctBtn=document.getElementById("pct"), cue=document.getElementById("cue");
  const panel=document.getElementById("panel");
  const W=3628.5,H=1962;

  const nodeEls={}; svg.querySelectorAll('.nodes>g[id^="flowchart-"]').forEach(g=>{const id=g.id.split("-")[1];if(id)nodeEls[id]=g;});
  const edgeEls=[]; svg.querySelectorAll('.edgePaths>path').forEach(p=>{let s=null,t=null;p.classList.forEach(c=>{if(c.startsWith("LS-"))s=c.slice(3);if(c.startsWith("LE-"))t=c.slice(3);});edgeEls.push({el:p,s,t});});
  const shortOf=id=>(INFO[id]&&INFO[id].t)||id;

  // pan / zoom
  let k=1,x=0,y=0; const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  function apply(){pz.style.transform=`translate(${x}px,${y}px) scale(${k})`;pctBtn.textContent=Math.round(k*100)+"%";}
  function fit(){const r=vp.getBoundingClientRect();k=clamp(Math.min(r.width/W,r.height/H)*0.94,0.05,8);x=(r.width-W*k)/2;y=(r.height-H*k)/2;apply();}
  function zoomAt(cx,cy,f){const nk=clamp(k*f,0.08,8);x=cx-(cx-x)*(nk/k);y=cy-(cy-y)*(nk/k);k=nk;apply();}
  vp.addEventListener("wheel",e=>{e.preventDefault();const r=vp.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.14:1/1.14);},{passive:false});
  let down=false,moved=false,sx=0,sy=0,ox=0,oy=0;
  let startNode=null;
  vp.addEventListener("pointerdown",e=>{if(e.button!==0)return;if(e.target.closest(".panel"))return;down=true;moved=false;sx=e.clientX;sy=e.clientY;ox=x;oy=y;startNode=e.target.closest?e.target.closest('.nodes>g[id^="flowchart-"]'):null;vp.classList.add("grabbing");vp.setPointerCapture(e.pointerId);});
  vp.addEventListener("pointermove",e=>{if(!down)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)+Math.abs(dy)>4)moved=true;x=ox+dx;y=oy+dy;apply();});
  vp.addEventListener("pointerup",e=>{if(!down)return;down=false;vp.classList.remove("grabbing");if(!moved){if(startNode)selectNode(startNode.id.split("-")[1]);else clearAll();}startNode=null;});

  // highlighting
  function setOn(ids,edgeTouch){diagram.classList.add("focus");
    Object.values(nodeEls).forEach(g=>g.classList.remove("on"));edgeEls.forEach(e=>e.el.classList.remove("on"));
    ids.forEach(id=>{const g=nodeEls[id];if(g)g.classList.add("on");});const set=new Set(ids);
    edgeEls.forEach(e=>{if(edgeTouch(e,set))e.el.classList.add("on");});}
  function clearAll(){diagram.classList.remove("focus");Object.values(nodeEls).forEach(g=>{g.classList.remove("on");g.classList.remove("sel");});
    edgeEls.forEach(e=>e.el.classList.remove("on"));document.querySelectorAll(".stages li").forEach(li=>li.classList.remove("active"));
    panel.classList.remove("open");activeStage=-1;}

  let activeStage=-1;
  function focusStage(i){activeStage=i;const s=STAGES[i];
    setOn(s.nodes,(e,set)=>set.has(e.s)||set.has(e.t));
    Object.values(nodeEls).forEach(g=>g.classList.remove("sel"));panel.classList.remove("open");
    document.querySelectorAll(".stages li").forEach((li,j)=>li.classList.toggle("active",j===i));
    showCue(s.name,s.color);frameNodes(s.nodes);}

  function selectNode(id){const s=node2stage[id]||{name:"—",color:"var(--accent)"},nf=INFO[id]||{t:id,d:"",p:[]};
    const nb=new Set([id]);edgeEls.forEach(e=>{if(e.s===id&&e.t)nb.add(e.t);if(e.t===id&&e.s)nb.add(e.s);});
    setOn([...nb],(e)=>e.s===id||e.t===id);
    Object.values(nodeEls).forEach(g=>g.classList.remove("sel"));if(nodeEls[id])nodeEls[id].classList.add("sel");
    document.querySelectorAll(".stages li").forEach(li=>li.classList.remove("active"));activeStage=-1;
    // fill panel
    const bd=document.getElementById("pBadge");bd.textContent=s.name;bd.style.background=s.color;
    document.getElementById("pTitle").textContent=nf.t;
    document.getElementById("pId").textContent="#"+id+(nf.k?" · "+nf.k:"");
    const tl=document.getElementById("pTool");tl.textContent=nf.tool||"";tl.style.display=nf.tool?"":"none";
    document.getElementById("pDesc").textContent=nf.d||"";
    const pr=document.getElementById("pParams");pr.innerHTML="";
    (nf.p||[]).forEach(([kk,vv])=>{const row=document.createElement("div");row.className="row";
      row.innerHTML=`<span class="k">${esc(kk)}</span><span class="v">${esc(vv)||"—"}</span>`;pr.appendChild(row);});
    document.getElementById("pParamsWrap").style.display=(nf.p&&nf.p.length)?"":"none";
    fillChips("pIn","pInWrap",edgeEls.filter(e=>e.t===id).map(e=>e.s));
    fillChips("pOut","pOutWrap",edgeEls.filter(e=>e.s===id).map(e=>e.t));
    panel.classList.add("open");
    frameNodes([id],1.35);   // gently zoom to the step, clear of the panel
  }
  function fillChips(elId,wrapId,ids){const box=document.getElementById(elId);box.innerHTML="";
    ids=[...new Set(ids)].filter(Boolean);
    document.getElementById(wrapId).style.display=ids.length?"":"none";
    ids.forEach(id=>{const b=document.createElement("button");b.textContent=shortOf(id);
      b.addEventListener("click",ev=>{ev.stopPropagation();selectNode(id);});box.appendChild(b);});}
  const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

  function frameNodes(ids,maxK){let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9,any=false;
    ids.forEach(id=>{const g=nodeEls[id];if(!g)return;const bb=g.getBBox(),m=g.getCTM();if(!m)return;
      [[bb.x,bb.y],[bb.x+bb.width,bb.y],[bb.x,bb.y+bb.height],[bb.x+bb.width,bb.y+bb.height]].forEach(pt=>{
        const X=m.a*pt[0]+m.c*pt[1]+m.e,Y=m.b*pt[0]+m.d*pt[1]+m.f;
        x0=Math.min(x0,X);y0=Math.min(y0,Y);x1=Math.max(x1,X);y1=Math.max(y1,Y);});any=true;});
    if(!any)return;const r=vp.getBoundingClientRect();const pad=panel.classList.contains("open")?380:120;
    const bw=x1-x0,bh=y1-y0;const nk=clamp(Math.min((r.width-pad)/(bw+160),r.height/(bh+220)),0.12,maxK||1.7);
    k=nk;x=(r.width-pad)/2-(x0+bw/2)*k;y=r.height/2-(y0+bh/2)*k;apply();}

  let cueT;function showCue(txt,color){cue.innerHTML='<span class="sw"></span>'+esc(txt);cue.querySelector(".sw").style.background=color;cue.classList.add("show");clearTimeout(cueT);cueT=setTimeout(()=>cue.classList.remove("show"),1600);}

  const ul=document.getElementById("stages");
  STAGES.forEach((s,i)=>{const li=document.createElement("li");li.tabIndex=0;
    li.innerHTML=`<span class="dot" style="background:${s.color}"></span><span class="nm">${esc(s.name)}</span><span class="ct">${s.nodes.length}</span>`;
    li.addEventListener("click",()=>focusStage(i));
    li.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();focusStage(i);}});ul.appendChild(li);});

  function stepStage(d){let i=activeStage<0?(d>0?0:STAGES.length-1):activeStage+d;i=(i+STAGES.length)%STAGES.length;focusStage(i);}
  function toggleTheme(){const c=document.documentElement.getAttribute("data-theme");const dark=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",dark?"light":"dark");}
  function toggleFull(){if(!document.fullscreenElement)app.requestFullscreen&&app.requestFullscreen();else document.exitFullscreen();}
  document.querySelectorAll("[data-act]").forEach(b=>b.addEventListener("click",()=>{const r=vp.getBoundingClientRect(),cx=r.width/2,cy=r.height/2;
    switch(b.dataset.act){case"zoomin":zoomAt(cx,cy,1.25);break;case"zoomout":zoomAt(cx,cy,1/1.25);break;case"reset":k=1;x=(r.width-W)/2;y=(r.height-H)/2;apply();break;
      case"fit":fit();break;case"prev":stepStage(-1);break;case"next":stepStage(1);break;case"all":clearAll();fit();break;case"theme":toggleTheme();break;case"full":toggleFull();break;case"rail":app.classList.toggle("norail");break;}}));
  document.getElementById("pClose").addEventListener("click",clearAll);
  addEventListener("fullscreenchange",()=>{document.getElementById("fullbtn").textContent=document.fullscreenElement?"🗗":"⛶";});
  addEventListener("keydown",e=>{if(e.target.tagName==="INPUT")return;const r=vp.getBoundingClientRect(),cx=r.width/2,cy=r.height/2;
    switch(e.key){case"ArrowRight":e.preventDefault();stepStage(1);break;case"ArrowLeft":e.preventDefault();stepStage(-1);break;
      case"+":case"=":zoomAt(cx,cy,1.25);break;case"-":case"_":zoomAt(cx,cy,1/1.25);break;case"0":fit();break;
      case"f":case"F":toggleFull();break;case"d":case"D":toggleTheme();break;case"Escape":clearAll();break;}});
  window.addEventListener("resize",()=>{if(activeStage<0&&!panel.classList.contains("open"))fit();});
  fit();
})();
</script>
