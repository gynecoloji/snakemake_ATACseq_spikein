# ATAC-seq analysis configuration

# Sample information table (columns: sample_id, type, group)
samples_table: "config/samples.csv"

# Adapter trimming: fastp AUTO-DETECTS adapters for paired-end reads by default
# (--detect_adapter_for_pe). To force specific adapters instead — which OVERRIDES
# auto-detection — uncomment adapter_r1/adapter_r2 below (Illumina defaults shown).
# adapter_r1: "AGATCGGAAGAGCACACGTCTGAACTCCAGTCA"
# adapter_r2: "AGATCGGAAGAGCGTCGTGTAGGGAAAGAGTGT"

# ── Alignment: concatenated (human + spike-in) reference ────────────────
# Human genome FASTA (you provide; MUST be chr-prefixed UCSC to match the blacklist)
human_fasta: "ref/hg38.fa"
# Combined bowtie2 index (human + prefixed spike-in), built by build_combined_genome
combined_index: "ref/COMBINED/genome"
# Restrict the HUMAN genome to these chromosomes before building the index (reads
# then align only to these + the spike-in). Set to [] to keep ALL human chroms.
align_chroms: [chr1, chr2, chr3, chr4, chr5, chr6, chr7, chr8, chr9, chr10, chr11, chr12, chr13, chr14, chr15, chr16, chr17, chr18, chr19, chr20, chr21, chr22, chrX, chrM]
# Analysis keep-set for the final human BAM: mito-% QC is recorded first, then reads
# are restricted to these chroms (drop chrM/chrY/non-primary). MUST be a subset of
# align_chroms, and kept consistent with keep_chroms_regex (Module B consensus).
keep_chroms: [chr1, chr2, chr3, chr4, chr5, chr6, chr7, chr8, chr9, chr10, chr11, chr12, chr13, chr14, chr15, chr16, chr17, chr18, chr19, chr20, chr21, chr22, chrX]

# Blacklist regions file
blacklist: "ref/hg38_blacklist_regions.bed"

# Peak types to analyze (narrowPeak for standard ATAC-seq, add broadPeak if needed)
peak_types: ["narrowPeak"]

# ── Module A: Spike-in normalization ────────────────────────────────────
# Spike-in genome FASTA — ANY species (Drosophila dm6, yeast, E. coli, mouse, ...).
# You provide this file; its chrom names get `spikein_prefix`, then it is
# concatenated with the human genome to build `combined_index`.
spikein_fasta: "ref/dm6.fa"
spikein_prefix: "spikein_"           # prepended to spike-in chrom names (avoid collisions + enable splitting)

# deepTools bigWig settings
effective_genome_size: 2913022398    # hg38 experimental genome (depth-normalized track only)
bin_size: 25

# ── Module B: Consensus peaks & fragment counting ───────────────────────
consensus_window: 500                # fixed peak width around summit (bp)
consensus_min_replicates: 2          # majority-vote threshold (conditions with >=3 reps)
idr_threshold: 0.05                  # IDR threshold (conditions with exactly 2 reps)
idr_relaxed_pvalue: 0.1              # MACS2 -p for relaxed calls (IDR input)
idr_top_n_peaks: 150000              # top-N relaxed peaks retained for IDR
keep_chroms_regex: "^chr([1-9]|1[0-9]|2[0-2]|X)$"   # primary autosomes + chrX
macs2_genome: "hs"                   # MACS2 -g for relaxed calls

# ── QC pipeline (workflow/rules/qc.smk) ─────────────────────────────────
gtf: "ref/gencode.v36.annotation.gtf"          # for TSS enrichment (chr-prefixed GENCODE)
promoter_bed: "ref/promoter_chr1-22X.bed"       # reads-in-annotation QC
enhancer_bed: "ref/enhancer_chr1-22X.bed"
spikein_pct_min: 2                              # Active Motif spike-in target lower bound (%)
spikein_pct_max: 10                             # upper bound (%)

# ── Differential openness (opt-in: `snakemake diffopen_all`) ────────────
# Constitutive-CTCF anchor set used by the `ctcf` normalization mode and by the
# anchor+shape hybrid. Built by workflow/scripts/build_constitutive_ctcf.py as
# the union of ENCODE CTCF ChIP-seq peaks across 59 diverse cell types, keeping
# regions bound in >=90% of them (18,108 regions, hg38; portable to any human
# sample). NOTE: do NOT point this at ref/GRCh38-cCREs.CTCF-only.bed — that is
# SCREEN's CA-CTCF class, which excludes CTCF sites at promoters/enhancers and
# is a poor normalization anchor (real CTCF peaks sit a median 12.8 kb away).
ctcf_bed: "ref/constitutive_ctcf_hg38.bed"
# Which normalizations to run for `diffopen_all`. Each writes its own directory
# under results/diffopen/ so the modes can be compared:
#   none    - DESeq2 median-of-ratios over all peaks (baseline)
#   spikein - size factors from the Drosophila spike-in depth
#   ctcf    - median-of-ratios restricted to CTCF anchors (spike-in free)
diffopen_modes: ["none", "spikein", "ctcf"]
diffopen_ref_label: "Control"        # reference level of the `type` column
# Hybrid anchor+shape (Method 6) parameters — rule diffopen_anchor_shape
anchor_shape_span: 0.6               # loess span for the intensity-dependent shape
anchor_shape_trim_k: 2.5             # MAD multiplier for trimming CTCF anchors that move
anchor_shape_iter: 2                 # shape/trim refinement iterations
