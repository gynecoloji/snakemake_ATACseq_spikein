# Run the ATAC-seq Snakemake workflow in a container.
#
#   docker compose build                                              # build the image (pre-bakes conda envs)
#   docker compose run --rm atacseq --cores 8                         # everything (primary → QC)
#   docker compose run --rm atacseq --cores 8 atacseq_all             # primary pipeline only
#   docker compose run --rm atacseq --cores 8 qc_all                  # QC only (after primary)
#   docker compose run --rm atacseq -n                                # dry run
#
# The whole project directory is mounted at /workflow, so the container reads your
# code + ref/ genomes + data/ FASTQs and writes results/ back to the host. The
# pre-built conda envs live at /opt/wf-conda inside the image (not under /workflow),
# so the mount does not hide them.

services:
  atacseq:
    build:
      context: .
      dockerfile: Dockerfile
    image: atacseq-spikein:latest
    working_dir: /workflow
    volumes:
      - ./:/workflow
    # Write outputs as the host user (avoids root-owned results/). Export
    # DOCKER_UID/DOCKER_GID or edit these defaults as needed.
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    environment:
      HOME: /tmp
    # Default command; override on the CLI (see examples above). The image's
    # ENTRYPOINT already sets `-s workflow/Snakefile --use-conda ...`, so this
    # only needs the cores (and an optional target).
    command: ["--cores", "8"]
