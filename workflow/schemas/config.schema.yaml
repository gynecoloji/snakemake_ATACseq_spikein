"$schema": "http://json-schema.org/draft-07/schema#"
title: ATAC-seq spike-in + consensus + QC — configuration
description: >-
  Parameters for the ATAC-seq spike-in normalization, consensus-peak and QC
  workflow. File paths are relative to the working directory (the repo root).
type: object

properties:

  samples_table:
    type: string
    description: >-
      Path to the sample sheet CSV. Columns: sample_id, type, group. Per-group
      reproducibility (majority vote / IDR / single) is derived from group size.
    default: config/samples.csv

  adapter_r1:
    type: string
    description: >-
      Optional. Explicit R1 adapter sequence that OVERRIDES fastp
      auto-detection. Leave unset to auto-detect adapters for paired-end reads
      (--detect_adapter_for_pe).
  adapter_r2:
    type: string
    description: Optional. Explicit R2 adapter sequence (used together with adapter_r1).

  human_fasta:
    type: string
    description: >-
      Human genome FASTA. Must be chr-prefixed UCSC (chr1..chrX) to match the
      blacklist.
    default: ref/hg38.fa
  spikein_fasta:
    type: string
    description: Spike-in genome FASTA (any species, e.g. Drosophila dm6, yeast, E. coli).
    default: ref/dm6.fa
  spikein_prefix:
    type: string
    description: >-
      Prefix prepended to spike-in chromosome names before concatenation, so
      spike-in reads can be split out after alignment.
    default: spikein_
  combined_index:
    type: string
    description: >-
      Bowtie2 index prefix for the built human + spike-in reference (created
      automatically by the build_combined_genome rule).
    default: ref/COMBINED/genome
  align_chroms:
    type: array
    items:
      type: string
    description: >-
      Human chromosomes kept when building the index (reads then align only to
      these plus the spike-in). Use an empty list to keep all human chromosomes.
  keep_chroms:
    type: array
    items:
      type: string
    description: >-
      Analysis keep-set for the final human BAM (mito-% QC is recorded first).
      Must be a subset of align_chroms and consistent with keep_chroms_regex.
  blacklist:
    type: string
    description: ENCODE-style blacklist BED (chr-prefixed).
    default: ref/hg38_blacklist_regions.bed

  peak_types:
    type: array
    items:
      type: string
      enum: [narrowPeak, broadPeak]
    description: Peak types to analyze (narrowPeak for standard ATAC-seq; add broadPeak if needed).
    default: [narrowPeak]

  effective_genome_size:
    type: integer
    minimum: 1
    description: Effective genome size for deepTools RPGC normalization (hg38 default).
    default: 2913022398
  bin_size:
    type: integer
    minimum: 1
    description: bigWig bin size in bp.
    default: 25

  consensus_window:
    type: integer
    minimum: 1
    description: Fixed consensus peak width around each summit, in bp.
    default: 500
  consensus_min_replicates:
    type: integer
    minimum: 1
    description: Majority-vote threshold for conditions with >=3 replicates.
    default: 2
  idr_threshold:
    type: number
    minimum: 0
    maximum: 1
    description: IDR threshold for conditions with exactly 2 replicates.
    default: 0.05
  idr_relaxed_pvalue:
    type: number
    minimum: 0
    maximum: 1
    description: MACS2 -p value for the relaxed peak calls used as IDR input.
    default: 0.1
  idr_top_n_peaks:
    type: integer
    minimum: 1
    description: Number of top relaxed peaks retained per replicate for IDR.
    default: 150000
  keep_chroms_regex:
    type: string
    description: >-
      Regex used by the consensus step to filter chromosomes; keep consistent
      with keep_chroms.
    default: "^chr([1-9]|1[0-9]|2[0-2]|X)$"
  macs2_genome:
    type: string
    description: MACS2 -g effective genome preset (e.g. hs, mm, ce, dm).
    default: hs

  gtf:
    type: string
    description: GENCODE GTF (chr-prefixed) used for TSS-enrichment QC.
    default: ref/gencode.v36.annotation.gtf
  promoter_bed:
    type: string
    description: Promoter BED used for the reads-in-annotation QC.
    default: ref/promoter_chr1-22X.bed
  enhancer_bed:
    type: string
    description: Enhancer BED used for the reads-in-annotation QC.
    default: ref/enhancer_chr1-22X.bed
  spikein_pct_min:
    type: number
    minimum: 0
    maximum: 100
    description: Lower bound (%) of the expected spike-in read fraction; drives the QC status flag.
    default: 2
  spikein_pct_max:
    type: number
    minimum: 0
    maximum: 100
    description: Upper bound (%) of the expected spike-in read fraction; drives the QC status flag.
    default: 10

  ctcf_bed:
    type: string
    description: >-
      Constitutive-CTCF anchor BED used by the `ctcf` differential-openness
      normalization and the anchor+shape hybrid. Built by
      workflow/scripts/build_constitutive_ctcf.py: the union of ENCODE CTCF
      ChIP-seq peaks across 59 cell types, restricted to regions bound in >=90%
      of them. Genome coordinates only, so it is reusable for any human sample.
    default: ref/constitutive_ctcf_hg38.bed
  diffopen_modes:
    type: array
    items:
      type: string
      enum: [none, spikein, ctcf, rnastable]
    description: >-
      Normalization modes run by the opt-in `diffopen_all` target, each written to
      its own results/diffopen/<mode>/ directory: `none` = DESeq2 median-of-ratios
      over all peaks, `spikein` = size factors from Drosophila spike-in depth,
      `ctcf` = median-of-ratios restricted to CTCF anchors (spike-in free),
      `rnastable` = median-of-ratios restricted to promoter-class peaks over the
      TSS window of RNA-seq-stable genes (needs diffopen_rna_table).
    default: [none, spikein, ctcf]
  diffopen_ref_label:
    type: string
    description: >-
      Reference level of the sample sheet's `type` column (the denominator of the
      contrast), e.g. "Control" for a NICD3-vs-Control comparison.
    default: Control
  ctcf_trim_k:
    type: number
    minimum: 0
    description: >-
      `ctcf` mode: MAD multiplier for the invariance trim — anchors whose
      between-condition shift is more than this many MADs from the median shift
      are dropped before re-estimating size factors. Large values disable it.
    default: 2.5
  ctcf_trim_iter:
    type: integer
    minimum: 0
    description: >-
      `ctcf` mode: number of trim / re-estimate iterations (0 = no trimming).
    default: 2
  diffopen_rna_table:
    type: string
    description: >-
      Path to the RNA-seq DESeq2/edgeR results table (TSV, or CSV by extension)
      used by the `rnastable` normalization. Required when `rnastable` is in
      diffopen_modes. Must contain the gene, log2FoldChange, padj and baseMean
      columns named by the diffopen_rna_*_col parameters.
  diffopen_rna_gene_col:
    type: string
    description: Column in diffopen_rna_table holding the gene symbol (matched to GTF gene_name).
    default: gene
  diffopen_rna_lfc_col:
    type: string
    description: Column in diffopen_rna_table holding the log2 fold change.
    default: log2FoldChange
  diffopen_rna_padj_col:
    type: string
    description: Column in diffopen_rna_table holding the adjusted p-value.
    default: padj
  diffopen_rna_basemean_col:
    type: string
    description: Column in diffopen_rna_table holding mean expression.
    default: baseMean
  diffopen_rna_basemean_min:
    type: number
    minimum: 0
    description: >-
      `rnastable`: minimum baseMean for a gene to be an eligible stable anchor
      (excludes underpowered low-count genes).
    default: 10
  diffopen_rna_padj_min:
    type: number
    minimum: 0
    maximum: 1
    description: >-
      `rnastable`: a gene counts as non-significant (stable) when padj >= this
      (or padj is NA). Higher = stricter "clearly unchanged" bar.
    default: 0.5
  diffopen_rna_lfc_max:
    type: number
    minimum: 0
    description: '`rnastable`: maximum |log2FoldChange| for a gene to count as stable.'
    default: 0.5
  diffopen_rna_tss_window:
    type: integer
    minimum: 0
    description: '`rnastable`: half-width (bp) of the TSS window used to link a stable gene to peaks.'
    default: 2000
  diffopen_rna_min_anchors:
    type: integer
    minimum: 1
    description: '`rnastable`: refuse to normalize on fewer than this many anchor peaks.'
    default: 100
  diffopen_rna_promoter_class_required:
    type: boolean
    description: >-
      `rnastable`: require anchor peaks to be promoter-class (Ensembl Regulatory
      Build) in addition to overlapping a stable-gene TSS window. Set false to
      relax to TSS-window overlap only when the strict set is too small.
    default: true
  rnastable_trim_k:
    type: number
    minimum: 0
    description: '`rnastable`: MAD multiplier for the invariance trim (as ctcf_trim_k).'
    default: 2.5
  rnastable_trim_iter:
    type: integer
    minimum: 0
    description: '`rnastable`: number of trim / re-estimate iterations (0 = no trimming).'
    default: 2

  anchor_shape_span:
    type: number
    minimum: 0
    maximum: 1
    description: loess span for the intensity-dependent shape curve (anchor+shape hybrid).
    default: 0.6
  anchor_shape_trim_k:
    type: number
    minimum: 0
    description: >-
      MAD multiplier for trimming CTCF anchors that move between conditions, so
      only invariant sites shape the correction (anchor+shape hybrid).
    default: 2.5
  anchor_shape_iter:
    type: integer
    minimum: 1
    description: Shape-fit / anchor-trim refinement iterations (anchor+shape hybrid).
    default: 2

required:
  - samples_table
  - human_fasta
  - spikein_fasta
  - spikein_prefix
  - combined_index
  - align_chroms
  - keep_chroms
  - blacklist
  - effective_genome_size
  - bin_size
  - consensus_window
  - consensus_min_replicates
  - idr_threshold
  - idr_relaxed_pvalue
  - idr_top_n_peaks
  - keep_chroms_regex
  - macs2_genome
  - gtf
  - promoter_bed
  - enhancer_bed
  - spikein_pct_min
  - spikein_pct_max
